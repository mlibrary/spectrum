name: Update Config Yaml

on: 
  workflow_dispatch:
  schedule:
    - cron:  '0 8 1 * *' #8AM first of the month

jobs:
  update-translation-maps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Fetch Library Collections Yaml
        working-directory: ./config
        run: wget https://raw.githubusercontent.com/mlibrary/search.catalog-index/refs/heads/main/umich_catalog_indexing/lib/translation_maps/umich/collection_map.yaml
      - name: Get PR title
        run: echo "PR_TITLE=$(date +'%B %Y') update config" >> $GITHUB_ENV
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with: 
          commit-message: "config: update collection yaml"
          title: ${{ env.PR_TITLE }}
          branch: update-config
