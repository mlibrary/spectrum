---
id: primo
href:
  field: id
metadata:
  name: Articles
  short_desc: "Search for articles, books, journals, and more"
source: primo
sorts:
  relevance: primo_relevance
  date_asc: primo_date_asc
  date_desc: primo_date_desc
#  title: primo_title
#  author: primo_author
new_parser: true
transformer: MLibrarySearchParser::Transformer::Solr::LocalParams
search_fields:
  all_fields: &ALL_FIELDS
    pf: .
    qf: .
  author: *ALL_FIELDS
  title: *ALL_FIELDS
  contributor: *ALL_FIELDS
  subject: *ALL_FIELDS
  isbn: *ALL_FIELDS
  issn: *ALL_FIELDS
  date: *ALL_FIELDS
  allfields: *ALL_FIELDS
  keyword: *ALL_FIELDS
  keywords: *ALL_FIELDS
  exact: *ALL_FIELDS
  contains: *ALL_FIELDS
  pmid: *ALL_FIELDS
  any: *ALL_FIELDS
search_field_default: any
search_attr_defaults:
  mm: $default_mm
  mm.autoRelax: $mm.autoRelax
  tie: $tie
solr_params:
  default_mm: "2<-1 5<67%"
  mm.autoRelax: true
  tie: 0.1


fields:
- id
- alt_ids
- primo_title
- primo_format
- retracted
- primo_author
- primo_author_csl
- primo_corporate_author_csl
- primo_publication_date
- primo_published_brief
- primo_pages
- publisher
- jtitle
- volume
- issue 
- genre
- primo_issn
- primo_eissn
- primo_isbn
- primo_eisbn
- doi
- oclcid
- pmid
- primo_language
- primo_subject
- primo_resource_access
- primo_times_cited
- abstract
- articles_edition
- peer_reviewed

# Searching
- primo_all_fields
- primo_any
- primo_keyword
- contains
- exact

# COinS
- z3988_rft_val_fmt

facets:
- primo_is_scholarly
- primo_exclude_newspapers
- primo_available_online
- primo_is_open_access
- primo_holdings_only
- primo_format
- primo_subject
- primo_publication_date
- primo_language

